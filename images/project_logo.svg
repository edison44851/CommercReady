<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">Technology Transfer n8n Workflow Logo</title>
  <desc id="desc">Shield and workflow path icon with project wordmark.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0b1020" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="920" height="240" rx="28" fill="url(#bgGrad)"/>

  <g transform="translate(60 55)" filter="url(#softShadow)">
    <path d="M90 0 L180 35 L180 105 C180 147 150 184 90 210 C30 184 0 147 0 105 L0 35 Z" fill="#0a1420" stroke="#7dd3fc" stroke-width="3"/>
    <path d="M90 18 L162 46 L162 104 C162 137 138 166 90 189 C42 166 18 137 18 104 L18 46 Z" fill="#0f2233"/>

    <circle cx="56" cy="88" r="10" fill="#22d3ee"/>
    <circle cx="92" cy="120" r="10" fill="#16a34a"/>
    <circle cx="128" cy="88" r="10" fill="#22d3ee"/>

    <path d="M56 88 L92 120 L128 88" fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M92 120 L92 155" fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="92" cy="166" r="8" fill="#16a34a"/>
  </g>

  <g transform="translate(280 72)">
    <text x="0" y="58" font-family="Segoe UI, Verdana, sans-serif" font-size="54" font-weight="700" fill="#f8fafc">Technology Transfer</text>
    <text x="0" y="116" font-family="Segoe UI, Verdana, sans-serif" font-size="54" font-weight="700" fill="#93c5fd">n8n Workflow</text>
    <rect x="2" y="138" width="520" height="4" rx="2" fill="url(#accentGrad)"/>
    <text x="0" y="176" font-family="Segoe UI, Verdana, sans-serif" font-size="23" font-weight="500" fill="#bfdbfe">Confidential AI Evaluation and Commercialization Readiness</text>
  </g>
